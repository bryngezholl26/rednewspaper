<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试页面</title>
    <style>
        /* 这里直接把 CSS 写在 HTML 里，绕过外部文件加载的问题 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f5f5f5; }

        .app-container { display: flex; min-height: 100vh; }
        
        /* 侧边栏样式 */
        .app-sidebar { 
            width: 220px; 
            background: #2f4050; 
            color: white; 
            flex-shrink: 0; 
            padding: 20px;
        }
        .menu-item { 
            padding: 10px 15px; 
            margin: 5px 0; 
            border-radius: 4px; 
            cursor: pointer; 
            list-style: none;
        }
        .menu-item.active { background: #1ab394; font-weight: bold; }
        .menu-item:hover { background: #1f2d3a; }

        /* 右侧主体 */
        .main-content { flex: 1; }

        /* 顶部栏 */
        .app-header {
            background: #2f4050; 
            color: white; 
            height: 60px;
            display: flex; 
            align-items: center; 
            padding: 0 20px;
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .app-header .logo { font-size: 18px; font-weight: bold; margin-right: 30px; }
        .header-actions { display: flex; align-items: center; gap: 20px; margin-left: auto; }
        .search-box input {
            padding: 6px 12px; 
            border: none; 
            border-radius: 4px;
            background: #3e576c; 
            color: white; 
            outline: none;
        }
        .user-profile {
            padding: 6px 12px; 
            background: #1ab394;
            border-radius: 4px; 
            cursor: pointer;
        }

        /* 主内容 */
        .app-main { padding: 20px; }
        .welcome-banner {
            text-align: center; 
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.8); 
            border-radius: 8px; 
            margin-bottom: 30px;
        }
        .timeline-container { position: relative; max-width: 800px; margin: 20px auto; }
        .timeline-container::before {
            content: ''; 
            position: absolute; 
            left: 19px; 
            top: 0; 
            bottom: 0;
            width: 2px; 
            background: #1ab394;
        }
        .timeline-item { display: flex; margin-bottom: 40px; }
        .timeline-dot {
            width: 40px; 
            height: 40px; 
            background: #fff;
            border: 4px solid #1ab394; 
            border-radius: 50%; 
            flex-shrink: 0;
        }
        .timeline-content {
            margin-left: 20px; 
            background: white; 
            padding: 20px;
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="app-sidebar">
            <div class="sidebar-menu">
                <ul>
                    <li class="menu-item active">首页</li>
                    <li class="menu-item">报纸</li>
                    <li class="menu-item">卷的分类</li>
                </ul>
            </div>
        </aside>
        
        <!-- 主体 -->
        <div class="main-content">
            <!-- 顶部栏 -->
            <header class="app-header">
                <div class="logo">红色日报</div>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" placeholder="搜关键字">
                    </div>
                    <div class="user-profile">个人中心</div>
                </div>
            </header>
            
            <!-- 内容区 -->
            <main class="app-main">
                <section class="welcome-banner">
                    <h1>欢迎来到红色档案馆</h1>
                    <p>这里汇聚了珍贵的历史文献与红色报刊，重温光辉岁月。</p>
                </section>
                <hr style="border:0; height:1px; background:#ccc; margin: 40px 0;">
                <section class="timeline-section">
                    <h2 style="text-align:center; color:#2f4050;">报刊时间轴</h2>
                    <div class="timeline-container">
                        <div class="timeline-item">
                            <div class="timeline-dot"></div>
                            <div class="timeline-content">
                                <h3>第 1 卷 · 1950年 1月</h3>
                                <p>建国初期重要报刊汇编，记录国家恢复与建设的开端。</p>
                                <div style="display:flex; gap:15px; margin-top:10px;">
                                    <div style="padding:10px 20px; background:#f8f8f8; border:1px solid #ddd; border-radius:4px;">第1期</div>
                                    <div style="padding:10px 20px; background:#f8f8f8; border:1px solid #ddd; border-radius:4px;">第2期</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>

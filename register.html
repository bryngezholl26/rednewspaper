<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 红报</title>
    <link rel="stylesheet" href="css/register.css">
    <script src="js/api.js"></script>
    <script src="js/newspaper-interaction.js" defer></script>
</head>
<body>
    <div class="register-container">
        <h2 class="register-title">用户注册</h2>
        <form id="register-form" class="register-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" placeholder="请输入手机号" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label for="confirmPwd">确认密码</label>
                <input type="password" id="confirmPwd" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="register-btn">立即注册</button>
            <p class="login-link">已有账号？前往登录</p>
        </form>
    </div>
</body>
</html>
